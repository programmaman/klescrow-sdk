name: Publish

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          registry-url: https://registry.npmjs.org
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Validate release metadata
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          PACKAGE_VERSION="$(node -p "require('./package.json').version")"
          test "$VERSION" = "$PACKAGE_VERSION" || { echo "Tag version does not match package.json."; exit 1; }
          grep -q "^## ${VERSION}\( \|$\)" CHANGELOG.md || { echo "Missing CHANGELOG.md entry."; exit 1; }
          awk -v version="$VERSION" '$0 ~ "^## " version "( |$)" { found=1; print; next } found && /^## / { exit } found { print }' CHANGELOG.md > release-notes.md
      - name: Verify package
        run: |
          npm run typecheck
          npm run lint
          npm run pack:check
      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "$GITHUB_REF_NAME" --verify-tag --title "@rakelabs/klescrow-sdk $GITHUB_REF_NAME" --notes-file release-notes.md
      - name: Publish to npm
        run: npm publish --provenance --access public
